app:
  id: "ari:cloud:ecosystem::app/8ed791e8-4229-4af1-b261-c396cc92aae7"
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64

modules:
  confluence:contentBylineItem:
    - key: read-confirm-byline
      resource: main
      resolver:
        function: resolver
      render: native
      title: Read Confirmations

  confluence:globalPage:
    - key: docack-global-page
      resource: global
      resolver:
        function: resolver
      render: native
      route: docack-tracker
      title: "Document Acknowledgement Tracker"

  webtrigger:
    - key: docack-webtrigger
      function: webtrigger
    - key: docack-jira-webtrigger
      function: jiraWebtrigger

  function:
    - key: resolver
      handler: index.handler
    - key: webtrigger
      handler: index.webtriggerHandler
    - key: jiraWebtrigger
      handler: index.jiraWebtriggerHandler

resources:
  - key: main
    path: src/frontend/index.jsx
  - key: global
    path: src/frontend/global.jsx

permissions:
  scopes:
    - storage:app
    - read:confluence-content.all
  external:
    fetch:
      backend:
        - 'https://cuhbioinformatics.atlassian.net'
